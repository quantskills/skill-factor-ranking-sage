name: Validate qsh-form

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 校验 qsh-form
        run: node scripts/validate-qsh-form.mjs SKILL.md
